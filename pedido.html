
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Pedido</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  box-sizing: border-box;
}

.form-box {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 10px;
  width: 100%;
  max-width: 450px;
}

.form-box h2 {
  font-size: 22px;
  margin-bottom: 20px;
  color: #e6c27a;
  text-align: center;
  word-wrap: break-word;
}

label {
  display: block;
  font-size: 15px;
  margin-bottom: 4px;
  color: #ccc;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 18px;
  border-radius: 8px;
  border: none;
  font-size: 16px;          /* 16px impede zoom automático no iOS */
  background: #2a2a2a;
  color: white;
  box-sizing: border-box;
}

textarea {
  min-height: 80px;
  resize: vertical;
}

button {
  width: 100%;
  padding: 16px;
  background: #ff3c00;
  border: none;
  color: white;
  font-weight: bold;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}

button:hover {
  background: #e03500;
}

</style>

</head>

<body>

<div class="form-box">

  <h2 id="lancheNome"></h2>

  <label for="nome">Nome</label>
  <input id="nome" placeholder="Seu nome">

  <label for="endereco">Endereço</label>
  <input id="endereco" placeholder="Rua, número, bairro">

  <label for="pagamento">Pagamento</label>
  <select id="pagamento">
    <option>PIX</option>
    <option>Dinheiro</option>
    <option>Cartão</option>
  </select>

  <label for="obs">Observações</label>
  <textarea id="obs" placeholder="Ex: sem cebola, ponto da carne..."></textarea>

  <button onclick="enviarPedido()">Enviar pedido</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const lanche = params.get("nome")
const preco  = params.get("preco")

document.getElementById("lancheNome").innerText =
  `${lanche} - R$${preco}`

function enviarPedido(){

  let nome      = document.getElementById("nome").value
  let endereco  = document.getElementById("endereco").value
  let pagamento = document.getElementById("pagamento").value
  let obs       = document.getElementById("obs").value

  let mensagem =
`Pedido - LastHit Hamburgueria

Lanche: ${lanche}
Preço: R$${preco}

Cliente: ${nome}
Endereço: ${endereco}

Pagamento: ${pagamento}

Obs: ${obs}`

  let url =
    `https://wa.me/5514988416460?text=${encodeURIComponent(mensagem)}`

  window.open(url)

}

</script>

</body>
</html>
```
